<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>404 — Not Found</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:#020602;font-family:'DM Mono',monospace;color:#fff;display:flex;align-items:center;justify-content:center;text-align:center;}
h1{font-family:'Bebas Neue',sans-serif;font-size:80px;letter-spacing:5px;color:#39FF14;text-shadow:0 0 30px rgba(57,255,20,0.3);line-height:1;}
p{font-size:12px;letter-spacing:3px;color:rgba(255,255,255,0.3);margin:12px 0 24px;text-transform:uppercase;}
a{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:3px;color:#39FF14;text-decoration:none;border:1px solid rgba(57,255,20,0.3);border-radius:8px;padding:10px 20px;}
</style>
</head>
<body>
<div>
  <h1>404</h1>
  <p>Page not found</p>
  <a href="/">← Go Home</a>
</div>
</body>
</html>
