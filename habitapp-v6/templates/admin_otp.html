<!-- admin_otp.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin OTP Verification</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:#020602;font-family:'DM Mono',monospace;color:#fff;display:flex;align-items:center;justify-content:center;background-image:radial-gradient(ellipse 60% 60% at 50% 0%,#1a0a0a99 0%,transparent 55%);}
.card{width:100%;max-width:360px;margin:20px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,59,48,0.2);border-radius:20px;padding:36px 30px;}
.logo{text-align:center;margin-bottom:26px;}
.logo h1{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:5px;color:#FF3B30;}
.logo p{font-size:9px;letter-spacing:3px;color:rgba(255,59,48,0.4);margin-top:4px;}
.info{background:rgba(255,215,0,0.08);border:1px solid rgba(255,215,0,0.2);border-radius:8px;padding:10px 14px;font-size:11px;color:rgba(255,215,0,0.7);margin-bottom:16px;line-height:1.6;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:8px;letter-spacing:3px;color:rgba(255,255,255,0.3);text-transform:uppercase;margin-bottom:6px;}
.field input{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:12px 14px;font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:8px;color:#fff;outline:none;text-align:center;}
.field input:focus{border-color:rgba(255,59,48,0.4);}
.btn{width:100%;padding:13px;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:4px;background:linear-gradient(135deg,rgba(255,59,48,0.2),rgba(255,59,48,0.08));border:1px solid rgba(255,59,48,0.35);border-radius:12px;color:#FF3B30;cursor:pointer;transition:all 0.3s;margin-top:4px;}
.err{background:rgba(255,59,48,0.1);border:1px solid rgba(255,59,48,0.3);border-radius:8px;padding:10px 14px;font-size:11px;color:#ff6b6b;margin-bottom:14px;}
</style>
</head>
<body>
<div class="card">
  <div class="logo"><h1>🔐 2FA VERIFY</h1><p>Check your admin email for OTP</p></div>
  {% if error %}<div class="err">⚠️ {{ error }}</div>{% endif %}
  <div class="info">📧 A 6-digit OTP has been sent to your admin email. It expires in 5 minutes.</div>
  <form method="POST" action="/admin/verify-otp">
    <div class="field"><label>Enter OTP</label><input type="text" name="otp" placeholder="000000" maxlength="6" required autofocus autocomplete="off"></div>
    <button type="submit" class="btn">VERIFY →</button>
  </form>
</div>
</body>
</html>
