<!-- payment_success.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Payment Successful!</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:#020602;font-family:'DM Mono',monospace;color:#fff;display:flex;align-items:center;justify-content:center;background-image:radial-gradient(ellipse 60% 60% at 50% 0%,#0e2f0e99 0%,transparent 55%);}
.card{width:100%;max-width:420px;margin:20px;background:rgba(57,255,20,0.04);border:1px solid rgba(57,255,20,0.2);border-radius:22px;padding:40px;text-align:center;}
.icon{font-size:64px;margin-bottom:16px;animation:bounce 0.6s ease;}
@keyframes bounce{0%{transform:scale(0)}70%{transform:scale(1.1)}100%{transform:scale(1)}}
h1{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:5px;color:#39FF14;text-shadow:0 0 20px rgba(57,255,20,0.3);margin-bottom:10px;}
p{font-size:11px;letter-spacing:2px;color:rgba(255,255,255,0.4);line-height:1.7;margin-bottom:24px;}
a{display:inline-block;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:3px;background:#39FF14;color:#020602;border-radius:10px;padding:12px 24px;text-decoration:none;box-shadow:0 0 20px rgba(57,255,20,0.25);}
</style>
</head>
<body>
<div class="card">
  <div class="icon">🎉</div>
  <h1>WELCOME TO PREMIUM!</h1>
  <p>Your payment was successful.<br>You now have access to all premium features including 3 habits, unlimited friends, and daily reminders!</p>
  <a href="/dashboard">GO TO DASHBOARD →</a>
</div>
</body>
</html>
